                        "background": "#fbf9f8",
                        "surface-dim": "#dcd9d9",
                        "surface-container-high": "#eae8e7",
                        "on-background": "#1b1c1c",
                        "tertiary-fixed": "#e2e2e2",
                        "on-primary-container": "#5e002b",
                        "surface-variant": "#e4e2e1",
                        "tertiary": "#5d5f5f",
                        "surface-bright": "#fbf9f8",
                        "on-tertiary-fixed": "#1a1c1c",
                        "primary-container": "#f06292",
                        "on-tertiary-container": "#2b2d2d",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#303030",
                        "secondary-container": "#f4dce4",
                        "secondary-fixed-dim": "#d7c1c8",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-container": "#f0eded",
                        "primary-fixed": "#ffd9e1",
                        "on-primary-fixed": "#3f001b",
                        "inverse-on-surface": "#f3f0f0",
                        "on-surface": "#1b1c1c",
                        "on-primary-fixed-variant": "#8b0e45",
                        "on-primary": "#ffffff",
                        "secondary": "#6b5a60",
                        "surface-container-low": "#f6f3f2",
                        "inverse-primary": "#ffb1c5",
                        "on-secondary-fixed-variant": "#524249",
                        "primary-fixed-dim": "#ffb1c5",
                        "outline-variant": "#ddbfc5",
                        "outline": "#8a7176",

                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c6c6c7",

                    borderRadius: {

            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        .petal-shadow {
            box-shadow: 0px 4px 20px rgba(171, 44, 93, 0.02);
        }
        .petal-shadow-hover:hover {
            box-shadow: 0px 8px 30px rgba(171, 44, 93, 0.05);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
        .btn-luxury {
            position: relative;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .btn-luxury:active { transform: scale(0.96) !important; }
        .btn-primary-luxury {
            overflow: hidden;
            z-index: 1;
        }
        .btn-primary-luxury::before {
            content: '';
            position: absolute; inset: 0;
            background: #8b0e45;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .btn-primary-luxury:hover::before { opacity: 1; }
        .btn-primary-luxury:hover {
            box-shadow: 0 4px 24px rgba(171, 44, 93, 0.25);
        }
        .btn-link-luxury {
            display: inline-block;
            position: relative;
            cursor: pointer;
        }
        .btn-link-luxury::after {
            content: '';
            position: absolute; bottom: -1px; left: 50%;
            width: 0; height: 1px;
            background: currentColor;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }
        .btn-link-luxury:hover::after { width: 100%; }
        .btn-link-luxury:hover { opacity: 0.65; }
        .btn-ghost-luxury {
            background: transparent; border: none;
            transition: opacity 0.25s ease, transform 0.15s ease;
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-ghost-luxury:hover { opacity: 0.55; }
        .btn-ghost-luxury:active { transform: scale(0.88) !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <title>FlowerShop | Contemporary Romance</title>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
